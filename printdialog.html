<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Print als PDF</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; }

        #toolbar {
            background: #0054a6;
            color: white;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 44px;
        }
        #toolbar span { flex: 1; font-weight: 600; }
        #toolbar button {
            background: white;
            color: #0054a6;
            border: none;
            padding: 5px 18px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }
        #toolbar button:hover { background: #e6f0ff; }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 44px);
            color: #555;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #ddd;
            border-top-color: #0054a6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #pdfContainer {
            display: none;
            width: 100%;
            height: calc(100vh - 44px);
        }
        embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media print {
            #toolbar { display: none; }
            #pdfContainer { height: 100vh; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <span>Print als PDF &mdash; Conti-Lines</span>
        <button onclick="doPrint()">&#128424; Afdrukken</button>
        <button onclick="doClose()">Sluiten</button>
    </div>
    <div id="loading">
        <div class="spinner"></div>
        <p>PDF wordt voorbereid...</p>
    </div>
    <div id="pdfContainer">
        <embed id="pdfEmbed" type="application/pdf"/>
    </div>

    <script>
        Office.onReady(function () {
            Office.context.ui.addHandlerAsync(
                Office.EventType.DialogParentMessageReceived,
                function (args) {
                    var dataUrl = args.message;
                    var embed = document.getElementById('pdfEmbed');
                    embed.src = dataUrl;

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('pdfContainer').style.display = 'block';

                    // Automatisch printdialoog openen na laden
                    setTimeout(function () { doPrint(); }, 1500);
                }
            );
        });

        function doPrint() {
            window.print();
        }

        function doClose() {
            Office.context.ui.messageParent('closed');
        }
    </script>
</body>
</html>
