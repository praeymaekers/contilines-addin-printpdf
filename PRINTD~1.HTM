<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Print als PDF</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { margin: 0; background: #555; font-family: Segoe UI, sans-serif; }

        #toolbar {
            position: fixed; top: 0; left: 0; right: 0;
            background: #0054a6; color: white;
            padding: 8px 16px; display: flex; align-items: center; gap: 12px;
            z-index: 100; height: 40px;
        }
        #toolbar span { flex: 1; font-weight: 600; }
        #toolbar button {
            background: white; color: #0054a6; border: none;
            padding: 4px 16px; font-weight: bold; border-radius: 3px;
            cursor: pointer; font-size: 13px;
        }

        #loading {
            color: white; text-align: center;
            padding-top: 80px; font-size: 15px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #pages { padding-top: 52px; }
        canvas {
            display: block;
            margin: 10px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            background: white;
        }

        @media print {
            #toolbar { display: none; }
            #loading { display: none; }
            body { background: white; }
            #pages { padding-top: 0; }
            canvas {
                margin: 0; box-shadow: none;
                page-break-after: always;
                width: 100% !important; height: auto !important;
            }
            canvas:last-child { page-break-after: avoid; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <span>Print als PDF &mdash; Conti-Lines</span>
        <button onclick="window.print()">&#128424; Afdrukken</button>
        <button onclick="Office.context.ui.messageParent('closed')">Sluiten</button>
    </div>
    <div id="loading">
        <div class="spinner"></div>
        <p>PDF wordt geladen...</p>
    </div>
    <div id="pages"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        Office.onReady(function () {
            // Stap 1: meld aan parent dat dialoog klaar is
            Office.context.ui.messageParent('ready');

            // Stap 2: wacht op PDF data van parent
            Office.context.ui.addHandlerAsync(
                Office.EventType.DialogParentMessageReceived,
                function (args) {
                    renderAndPrint(args.message);
                }
            );
        });

        function renderAndPrint(dataUrl) {
            pdfjsLib.getDocument(dataUrl).promise
                .then(function (pdf) {
                    document.getElementById('loading').style.display = 'none';
                    var container = document.getElementById('pages');
                    var pagePromises = [];
                    for (var i = 1; i <= pdf.numPages; i++) {
                        pagePromises.push(renderPage(pdf, i, container));
                    }
                    return Promise.all(pagePromises);
                })
                .then(function () {
                    setTimeout(function () { window.print(); }, 800);
                })
                .catch(function (err) {
                    document.getElementById('loading').innerHTML =
                        '<p style="color:red;padding:20px;">Fout bij laden PDF:<br>' + err.message + '</p>';
                });
        }

        function renderPage(pdf, pageNum, container) {
            return pdf.getPage(pageNum).then(function (page) {
                var viewport = page.getViewport({ scale: 1.5 });
                var canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                container.appendChild(canvas);
                return page.render({
                    canvasContext: canvas.getContext('2d'),
                    viewport: viewport
                }).promise;
            });
        }
    </script>
</body>
</html>
